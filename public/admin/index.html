<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocarPay — Painel de Licenças</title>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const MASTER_EMAIL = 'contatotransgu@gmail.com';

  const app = initializeApp({
    apiKey: "AIzaSyDTd-f-QTKNhixlYCDVHI5pGe9H8hxwON4",
    authDomain: "locarpayapp.firebaseapp.com",
    projectId: "locarpayapp"
  });

  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  let licenses = [];

  function $(id) { return document.getElementById(id); }

  function showSection(id) {
    ['login-section','dashboard-section','blocked-section'].forEach(s => {
      $(s).style.display = 'none';
    });
    $(id).style.display = 'block';
  }

  async function loadLicenses() {
    const snap = await getDocs(collection(db, 'licenses'));
    licenses = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderTable();
  }

  function renderTable() {
    const tbody = $('licenses-tbody');
    tbody.innerHTML = '';
    if (licenses.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">Nenhuma licença cadastrada</td></tr>';
      return;
    }
    licenses.forEach(lic => {
      const expiry = lic.expiresAt ? new Date(lic.expiresAt.seconds * 1000).toLocaleDateString('pt-BR') : '—';
      const badge = lic.active
        ? '<span class="badge active">Ativa</span>'
        : '<span class="badge inactive">Inativa</span>';
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${lic.id}</td>
        <td>${lic.ownerName || '—'}</td>
        <td>${lic.plan || 'basic'}</td>
        <td>${badge}</td>
        <td>${expiry}</td>
        <td class="actions">
          <button class="btn-sm toggle" data-id="${lic.id}" data-active="${lic.active}">${lic.active ? 'Desativar' : 'Ativar'}</button>
        </td>
      `;
      tbody.appendChild(row);
    });

    tbody.querySelectorAll('.toggle').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        const newActive = btn.dataset.active === 'true' ? false : true;
        btn.disabled = true;
        btn.textContent = '...';
        await updateDoc(doc(db, 'licenses', id), { active: newActive });
        await loadLicenses();
      });
    });
  }

  $('btn-login').addEventListener('click', async () => {
    try {
      await signInWithPopup(auth, provider);
    } catch(e) {
      $('login-error').textContent = e.message;
    }
  });

  $('btn-logout').addEventListener('click', () => signOut(auth));

  $('btn-add').addEventListener('click', () => {
    $('modal').style.display = 'flex';
  });

  $('modal-cancel').addEventListener('click', () => {
    $('modal').style.display = 'none';
  });

  $('modal-save').addEventListener('click', async () => {
    const email = $('new-email').value.trim().toLowerCase();
    const name = $('new-name').value.trim();
    const plan = $('new-plan').value;
    const expDate = $('new-expiry').value;
    if (!email || !name) { alert('Preencha email e nome'); return; }

    const data = {
      ownerName: name,
      plan,
      active: true,
      createdAt: serverTimestamp(),
      expiresAt: expDate ? new Date(expDate) : null
    };

    $('modal-save').disabled = true;
    $('modal-save').textContent = 'Salvando...';
    await setDoc(doc(db, 'licenses', email), data);
    $('modal').style.display = 'none';
    $('new-email').value = '';
    $('new-name').value = '';
    $('new-expiry').value = '';
    $('modal-save').disabled = false;
    $('modal-save').textContent = 'Salvar';
    await loadLicenses();
  });

  onAuthStateChanged(auth, async user => {
    if (!user) {
      showSection('login-section');
      return;
    }
    if (user.email !== MASTER_EMAIL) {
      showSection('blocked-section');
      return;
    }
    $('user-email').textContent = user.email;
    showSection('dashboard-section');
    await loadLicenses();
  });
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
  }
  header {
    background: #1a1d2e;
    border-bottom: 1px solid #2a2d3e;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 20px; font-weight: 700; color: #fff; }
  header span { font-size: 13px; color: #888; }
  .btn {
    background: #4F86F7;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #3a70e0; }
  .btn-outline {
    background: transparent;
    border: 1px solid #3a3d52;
    color: #aaa;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
  }
  .btn-outline:hover { border-color: #aaa; color: #fff; }
  .btn-sm {
    background: #2a2d3e;
    color: #aaa;
    border: 1px solid #3a3d52;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
  }
  .btn-sm:hover { background: #3a3d52; color: #fff; }

  /* Login */
  #login-section {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
  }
  .login-card {
    background: #1a1d2e;
    border: 1px solid #2a2d3e;
    border-radius: 16px;
    padding: 48px;
    text-align: center;
    max-width: 400px;
    width: 100%;
  }
  .login-card h2 { font-size: 24px; margin-bottom: 8px; }
  .login-card p { color: #888; font-size: 14px; margin-bottom: 32px; }
  #login-error { color: #ef5350; font-size: 13px; margin-top: 12px; min-height: 20px; }

  /* Dashboard */
  #dashboard-section { display: none; padding: 32px; }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .section-header h2 { font-size: 20px; font-weight: 700; }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #1a1d2e;
    border-radius: 12px;
    overflow: hidden;
  }
  th {
    background: #20233a;
    padding: 14px 16px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  td { padding: 14px 16px; font-size: 14px; border-top: 1px solid #2a2d3e; }
  tr:hover td { background: #20233a; }
  .empty { text-align: center; color: #555; padding: 40px; }
  .actions { white-space: nowrap; }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge.active { background: #1b3a1f; color: #4caf50; }
  .badge.inactive { background: #3a1a1a; color: #ef5350; }

  /* Blocked */
  #blocked-section {
    display: none;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    text-align: center;
  }

  /* Modal */
  #modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-box {
    background: #1a1d2e;
    border: 1px solid #2a2d3e;
    border-radius: 16px;
    padding: 32px;
    width: 420px;
    max-width: 95%;
  }
  .modal-box h3 { font-size: 18px; margin-bottom: 20px; }
  label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; margin-top: 14px; }
  input, select {
    width: 100%;
    background: #0f1117;
    border: 1px solid #3a3d52;
    border-radius: 8px;
    padding: 10px 12px;
    color: #e0e0e0;
    font-size: 14px;
  }
  input:focus, select:focus { outline: none; border-color: #4F86F7; }
  .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
</style>
</head>
<body>

<header>
  <h1>LocarPay Admin</h1>
  <div style="display:flex;align-items:center;gap:16px">
    <span id="user-email"></span>
    <button class="btn-outline" id="btn-logout">Sair</button>
  </div>
</header>

<!-- Login -->
<section id="login-section">
  <div class="login-card">
    <h2>Painel de Licenças</h2>
    <p>Faça login com a conta de administrador para gerenciar as licenças dos proprietários.</p>
    <button class="btn" id="btn-login" style="width:100%">Entrar com Google</button>
    <div id="login-error"></div>
  </div>
</section>

<!-- Dashboard -->
<section id="dashboard-section">
  <div class="section-header">
    <h2>Licenças de Proprietários</h2>
    <button class="btn" id="btn-add">+ Nova Licença</button>
  </div>
  <table>
    <thead>
      <tr>
        <th>E-mail</th>
        <th>Proprietário</th>
        <th>Plano</th>
        <th>Status</th>
        <th>Validade</th>
        <th>Ação</th>
      </tr>
    </thead>
    <tbody id="licenses-tbody">
      <tr><td colspan="6" class="empty">Carregando...</td></tr>
    </tbody>
  </table>
</section>

<!-- Blocked -->
<section id="blocked-section" style="display:none;flex-direction:column;gap:12px">
  <div style="font-size:48px">🚫</div>
  <h2>Acesso negado</h2>
  <p style="color:#888">Esta conta não tem permissão para acessar o painel.</p>
  <button class="btn-outline" onclick="document.getElementById('btn-logout').click()">Sair</button>
</section>

<!-- Modal: Nova Licença -->
<div id="modal">
  <div class="modal-box">
    <h3>Nova Licença</h3>
    <label>E-mail do proprietário *</label>
    <input id="new-email" type="email" placeholder="proprietario@email.com">
    <label>Nome do proprietário *</label>
    <input id="new-name" type="text" placeholder="João Silva">
    <label>Plano</label>
    <select id="new-plan">
      <option value="basic">Basic</option>
      <option value="premium">Premium</option>
    </select>
    <label>Validade (deixe vazio para sem prazo)</label>
    <input id="new-expiry" type="date">
    <div class="modal-actions">
      <button class="btn-outline" id="modal-cancel">Cancelar</button>
      <button class="btn" id="modal-save">Salvar</button>
    </div>
  </div>
</div>

</body>
</html>
